name: CI

on:
  workflow_dispatch:
  pull_request:
    types:
      - ready_for_review
      - labeled

permissions:
  contents: read

jobs:
  build-test:
    name: Build and test
    if: github.event_name == 'workflow_dispatch' || github.event.action == 'ready_for_review' || contains(github.event.pull_request.labels.*.name, 'merge-ready')
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npm test
